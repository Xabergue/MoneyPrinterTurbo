# MoneyPrinterTurbo — Arquivo de Configuração
# Copie este arquivo para config.toml e ajuste os valores conforme necessário.

[app]
# Fonte de vídeo: "local", "pexels" ou "pixabay"
# Use "local" para buscar vídeos na pasta resource/videos/
video_source = "local"

# Ocultar painel de configuração na interface
hide_config = false

# Verificação de certificado TLS para APIs e downloads de materiais.
# Mantenha ativado (true) por segurança. Desative apenas em ambientes
# com proxy corporativo ou certificados auto-assinados.
tls_verify = true

########## Chaves de API — Pexels ##########
# Registre-se em https://www.pexels.com/api/ para obter sua chave.
# Você pode usar múltiplas chaves para evitar limites de taxa.
# Exemplo: pexels_api_keys = ["chave1", "chave2"]
pexels_api_keys = []

########## Chaves de API — Pixabay ##########
# Registre-se em https://pixabay.com/api/docs/ para obter sua chave.
pixabay_api_keys = []

########## Provedor LLM ##########
# Apenas cliente OpenAI-compatível é suportado.
# Use DeepSProxy ou qualquer proxy OpenAI-compatível rodando localmente.
# O endpoint padrão aponta para http://localhost:3000/v1 (DeepSProxy).
llm_provider = "openai"

# URL base do endpoint LLM local.
# DeepSProxy: http://localhost:3000/v1
# Ollama: http://localhost:11434/v1
# Outro proxy compatível com OpenAI: ajuste conforme necessário.
openai_base_url = "http://localhost:3000/v1"

# Modelo LLM a ser usado via endpoint local.
# deepseek-chat é o padrão recomendado para DeepSProxy.
openai_model_name = "deepseek-chat"

# Chave de API. Para endpoints locais como DeepSProxy, qualquer string funciona.
# Use "local" como padrão — o proxy não exige chave real.
openai_api_key = "local"

########## Provedor de Legendas ##########
# Apenas "whisper" está disponível (o provedor "edge" foi removido).
# O modelo padrão é "medium" (1.4GB), que roda bem em CPU.
# Modelos disponíveis: tiny, base, small, medium, large-v3
subtitle_provider = "whisper"

########## Configuração do Whisper ##########
[whisper]
# Tamanho do modelo: "medium" é recomendado (bom equilíbrio qualidade/performance).
# Use "large-v3" para máxima qualidade (requer ~3GB de RAM e GPU recomendada).
model_size = "medium"

# Dispositivo: "cpu" ou "cuda" (se tiver GPU NVIDIA)
device = "cpu"

# Tipo de computação: "int8" para CPU, "float16" para GPU
compute_type = "int8"

########## Configuração do Servidor ##########
# Host e porta do servidor API
listen_host = "0.0.0.0"
listen_port = 8080

# Nível de log: DEBUG, INFO, WARNING, ERROR
log_level = "DEBUG"

# Nome do projeto e versão
project_name = "MoneyPrinterTurbo"
project_description = "Gerador automático de vídeos curtos com IA"
project_version = "2.0.0"

########## Configuração de Proxy ##########
# Descomente e configure se precisar de proxy para acessar APIs externas.
# [proxy]
# http = "http://proxy:porta"
# https = "http://proxy:porta"

########## Configuração Redis (Opcional) ##########
# Se habilitado, o estado das tarefas será persistido no Redis
# ao invés de apenas na memória.
# [app]
# enable_redis = false
# redis_host = "localhost"
# redis_port = 6379
# redis_db = 0
# redis_password = ""

########## Configuração da Interface ##########
[ui]
# Ocultar logs na interface
hide_log = false
# Idioma padrão da interface
language = "pt-BR"

########## ImageMagick ##########
# ImageMagick é detectado automaticamente, exceto no Windows!
# No Windows, configure o caminho para o executável magick.exe.
# Exemplo: imagemagick_path = "C:\\Program Files\\ImageMagick-7.1.1-Q16-HDRI\\magick.exe"
# imagemagick_path = ""

########## FFmpeg ##########
# O FFmpeg é baixado automaticamente na maioria dos casos.
# Se necessário, configure o caminho manualmente.
# Exemplo: ffmpeg_path = "C:\\ffmpeg\\bin\\ffmpeg.exe"
# ffmpeg_path = ""

########## Configuração de Tarefas ##########
# Máximo de tarefas executando simultaneamente
# max_concurrent_tasks = 5
# Máximo de tarefas na fila de espera
# max_queued_tasks = 100
